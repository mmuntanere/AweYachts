<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWE YACHTS | Under Construction</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --navy: #061020;
      --gold: #C9A96E;
      --cream: #E8DFD0;
      --font-heading: 'Cormorant', serif;
      --font-body: 'Raleway', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--navy);
      color: var(--cream);
      font-family: var(--font-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      max-width: 600px;
      opacity: 0;
      animation: fadeIn 1.5s ease-out forwards;
    }

    .logo {
      width: 220px;
      margin-bottom: 50px;
      transition: transform 0.8s ease;
    }
    
    .logo:hover {
      transform: scale(1.05);
    }

    .status-tag {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 300;
      font-style: italic;
      margin-bottom: 24px;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    p {
      font-weight: 200;
      font-size: 14px;
      letter-spacing: 1px;
      color: rgba(232, 223, 208, 0.7);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .line {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 40px auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Ambient light effect */
    .bg-light {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      height: 80vh;
      background: radial-gradient(circle, rgba(20, 40, 69, 0.4) 0%, rgba(6, 16, 32, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="bg-light"></div>

  <div class="container">
    <img src="logo.png" alt="AWE YACHTS Logo" class="logo">
    
    <span class="status-tag">Coming Soon</span>
    <h1>Redefining the <br><em>Yachting Horizon</em></h1>
    
    <div class="line"></div>
    
    <p>We are currently refining our digital presence to offer you an unparalleled experience in luxury yacht brokerage.</p>
  </div>

</body>
</html>
